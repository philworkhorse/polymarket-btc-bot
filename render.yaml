services:
  - type: web
    name: polymarket-btc-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MIN_EDGE
        value: "0.03"
      - key: BET_SIZE_USDC
        value: "10"
      - key: MAX_DAILY_LOSS
        value: "50"
    plan: free
