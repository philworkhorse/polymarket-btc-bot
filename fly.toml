app = "polymarket-btc-bot"
primary_region = "mia"

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  PORT = "8080"
  MIN_EDGE = "0.03"
  BET_SIZE_USDC = "10"
  MAX_DAILY_LOSS = "50"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
